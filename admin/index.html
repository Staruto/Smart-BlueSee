<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Bluesee Admin Dashboard</title>
  <link rel="stylesheet" href="/admin/style.css" />
</head>
<body>
  <header>
    <h1>Bluesee Admin Dashboard</h1>
    <p id="server-meta">Loading...</p>
  </header>

  <main>
    <section class="card">
      <h2>Module Controls</h2>
      <div class="row">
        <label><input type="checkbox" id="mod-asr" /> ASR</label>
        <label><input type="checkbox" id="mod-llm" /> LLM</label>
        <label><input type="checkbox" id="mod-tts" /> TTS</label>
        <button id="save-modules">Apply</button>
      </div>
      <p id="module-msg"></p>
    </section>

    <section class="card">
      <h2>Live Summary</h2>
      <div class="kv"><span>Active Device</span><strong id="sum-device">-</strong></div>
      <div class="kv"><span>Connection Time</span><strong id="sum-duration">-</strong></div>
      <div class="kv"><span>Utterances</span><strong id="sum-utterances">-</strong></div>
      <div class="kv"><span>Latency Avg</span><strong id="sum-latency">-</strong></div>
      <div class="kv"><span>Traffic In/Out</span><strong id="sum-traffic">-</strong></div>
      <div class="kv"><span>Last Error</span><strong id="sum-error">none</strong></div>
    </section>

    <section class="card">
      <h2>Fallback Text to Device</h2>
      <textarea id="fallback-text" rows="3" placeholder="Type text to synthesize and push to connected ESP32..."></textarea>
      <div class="row">
        <button id="send-fallback">Send TTS</button>
        <span id="fallback-msg"></span>
      </div>
    </section>

    <section class="card">
      <h2>Recent Connections</h2>
      <pre id="connections-summary">-</pre>
    </section>

    <section class="card">
      <h2>Recent Events</h2>
      <div class="row">
        <label for="event-severity">Severity</label>
        <select id="event-severity">
          <option value="error,warning" selected>Error + Warning</option>
          <option value="info,error,warning">Info + Error + Warning</option>
          <option value="debug,info,error,warning">All</option>
        </select>
      </div>
      <pre id="events">-</pre>
    </section>

    <section class="card full-width">
      <details>
        <summary>Detailed JSON</summary>
        <h3>Active Connection Raw</h3>
        <pre id="active-device-raw">-</pre>
        <h3>Metrics Raw</h3>
        <pre id="stats-raw">-</pre>
        <h3>Connections Raw</h3>
        <pre id="connections-raw">-</pre>
      </details>
    </section>
  </main>

  <script src="/admin/app.js"></script>
</body>
</html>
